# Senseair Sunrise CO2 sensor - ESPHome example config
#
# Wiring (ESP8266 D1 Mini → Sunrise):
#   D1 Mini 3V3  → Pin 2 (VBB), Pin 3 (VDDIO), Pin 9 (EN)
#   D1 Mini GND  → Pin 1 (GND), Pin 6 (COMSEL, selects I2C mode)
#   D1 Mini D2   → Pin 4 (SDA)
#   D1 Mini D1   → Pin 5 (SCL)
#   Pin 7 (nRDY): leave floating (or wire to D5 for single mode, see example_battery.yaml)
#   Leave floating: Pin 8 (DVCC)
#
# For ESP32, change the board and I2C pins:
#   esp32:
#     board: esp32dev
#   i2c:
#     sda: GPIO21
#     scl: GPIO22

esphome:
  name: sunrise-test

esp8266:
  board: d1_mini

external_components:
  - source:
      type: local
      path: components

logger:

i2c:
  sda: D2
  scl: D1

sensor:
  - platform: senseair_sunrise
    id: my_sunrise
    co2:
      name: "CO2"
    temperature:
      name: "Sensor Temperature"
    # measurement_mode: continuous  # default; see example_battery.yaml for single mode
    #
    # Measurement tuning (optional):
    # number_of_samples: 8    # 1-1024, default 8. More samples = better accuracy, more power.
    # measurement_period: 16s # Default 16s (factory). Set longer for power savings.
    #                         # Must be >= samples x 300ms, rounded to even seconds.
    # iir_filter: true        # Auto-disabled if measurement_period > 60s.
    #                         # For periods > 60s: disable IIR and increase samples (e.g. 32).
    # abc_period: 180h        # ABC auto-calibration period (default 180h / 7.5 days).
    #                         # Shorter (e.g. 192h = 8d) for well-ventilated spaces,
    #                         # longer for stable or confined environments.
    #
    # Pressure compensation (optional, pick one):
    # pressure_source: bmp280_pressure  # ID of a pressure sensor (e.g. BMP280), in hPa
    # pressure: 1013.25                 # Static pressure in hPa (sea level default)
    # altitude: 250                     # Altitude in meters (auto-converts to pressure)
    update_interval: 60s

button:
  - platform: template
    name: "Background Calibration"
    on_press:
      - senseair_sunrise.background_calibration:
          id: my_sunrise
  - platform: template
    name: "Enable ABC"
    on_press:
      - senseair_sunrise.abc_enable:
          id: my_sunrise
  - platform: template
    name: "Disable ABC"
    on_press:
      - senseair_sunrise.abc_disable:
          id: my_sunrise
